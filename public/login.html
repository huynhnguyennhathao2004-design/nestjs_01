<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập hệ thống</title>
  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <div class="login-page">
    <div class="login-left">
      <h1>Du lịch Việt Nam TTS</h1>
      <p>
      Website giới thiệu địa điểm du lịch tại Việt Nam, tích hợp AI Text-to-Speech
      giúp chuyển nội dung mô tả thành giọng đọc tự nhiên.
      </p>
    </div>

    <div class="login-right">
      <form class="login-card" id="loginForm">
        <h2>Đăng nhập</h2>
        <p class="subtitle">Vui lòng nhập thông tin tài khoản</p>

        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            placeholder="Nhập email"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">Mật khẩu</label>
          <input
            type="password"
            id="password"
            placeholder="Nhập mật khẩu"
            required
          />
        </div>

        <button type="submit">Đăng nhập</button>

        <p id="message" class="message"></p>

        <div class="demo-account">
          <p><strong>Tài khoản demo</strong></p>
          <p>Email: admin@gmail.com</p>
          <p>Mật khẩu: 123456</p>
        </div>
      </form>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
